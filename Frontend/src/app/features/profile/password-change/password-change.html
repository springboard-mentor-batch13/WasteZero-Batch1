<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="form-layout">
  <div class="section-header">
    <h2>Change Password</h2>
    <p>Update your password to secure your account.</p>
  </div>

  <div class="form-group">
    <label for="currentPassword">Current Password</label>
    <input id="currentPassword" type="password" formControlName="currentPassword">
  </div>

  <div class="form-group">
    <label for="newPassword">New Password</label>
    <input id="newPassword" type="password" formControlName="newPassword">
    <small>Password must be at least 8 characters long.</small>
  </div>

  <div class="form-group">
    <label for="confirmPassword">Confirm New Password</label>
    <input id="confirmPassword" type="password" formControlName="confirmPassword">
  </div>

  <button type="submit" class="btn-primary">Change Password</button>
</form>

<!-- OTP Verification Modal Overlay -->
<div *ngIf="showOtpModal" class="modal-overlay">
  <!-- Modal Card -->
  <div class="modal-card">
    
    <!-- Header -->
    <div class="modal-header">
      <h3>Verify Your Request</h3>
      <p>An OTP has been sent to your registered email. Please enter it below to confirm your password change.</p>
    </div>

    <!-- OTP Input -->
    <div class="modal-body">
      <label for="otpInput">Enter OTP</label>
      <input 
        type="text" 
        id="otpInput" 
        [(ngModel)]="otpValue" 
        placeholder="e.g., 123456"
        autocomplete="off"
      >
    </div>

    <!-- Actions -->
    <div class="modal-footer">
      <button type="button" class="btn-secondary" (click)="closeOtpModal()">Close</button>
      <button type="button" class="btn-primary" (click)="submitOtp()">Submit</button>
    </div>
    
  </div>
</div>
