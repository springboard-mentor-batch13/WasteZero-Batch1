<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #f4f4f4;">
  <table role="presentation" style="width: 100%; max-width: 600px; margin: 0 auto; padding: 20px;">
    <tr>
      <td style="background: #ffffff; border-radius: 8px; padding: 40px; text-align: center;">
        <h1 style="color: #2d6a4f; margin: 0 0 10px;">WasteZero</h1>
        <p style="color: #666; font-size: 16px; margin: 20px 0;">We received a request to reset your password. Use the code below to set a new password.</p>
        <div style="background: #f0f7f4; border-radius: 8px; padding: 20px; margin: 20px 0;">
          <p style="color: #333; font-size: 14px; margin: 0 0 10px;">Your password reset code</p>
          <h2 style="letter-spacing: 8px; font-size: 36px; color: #2d6a4f; margin: 0;">{{otp}}</h2>
        </div>
        <p style="color: #999; font-size: 12px; margin: 20px 0 0;">This code expires in 10 minutes. If you did not request a password reset, please ignore this email.</p>
      </td>
    </tr>
  </table>
