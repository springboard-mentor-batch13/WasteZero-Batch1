<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: #2e7d32; font-size: 22px; margin: 0; }
    .otp { text-align: center; font-size: 36px; font-weight: bold; letter-spacing: 6px; color: #1b5e20; background: #e8f5e9; border-radius: 8px; padding: 16px; margin: 24px 0; }
    .info { color: #666; font-size: 14px; line-height: 1.6; text-align: center; }
    .footer { text-align: center; color: #999; font-size: 12px; margin-top: 24px; border-top: 1px solid #eee; padding-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Two-Factor Authentication</h1>
    </div>
    <p class="info">Your 2FA verification code is:</p>
    <div class="otp">{{otp}}</div>
    <p class="info">This code expires in 5 minutes.<br>If you did not request this code, please ignore this email.</p>
    <div class="footer">
      <p>WasteZero &mdash; Smart Waste Pickup &amp; Recycling Platform</p>
    </div>
  </div>
</body>
</html>
